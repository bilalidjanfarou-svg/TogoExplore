{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes favoris - TogoExplore</title>
</head>

<body>

    <h1>❤️ Mes lieux favoris</h1>

    <a href="{% url 'home' %}">
        ← Retour à l'accueil
    </a>

    <hr>

    {% for favorite in favorites %}

        <div>
            <h2>{{ favorite.site.name }}</h2>

            <p>
                {{ favorite.site.description }}
            </p>

            <p>
                📍 {{ favorite.site.location }}
            </p>

            <a href="{% url 'site_detail' favorite.site.id %}">
                Voir le site
            </a>
        </div>

        <hr>

    {% empty %}

        <p>
            Vous n'avez encore aucun site favori.
        </p>

    {% endfor %}

</body>
</html>
