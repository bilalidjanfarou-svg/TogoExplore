<!DOCTYPE html>
<html>
<head>
    <title>Inscription</title>
</head>
<body>

<h1>Inscription</h1>

{% if error %}
    <p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Nom d'utilisateur" required>
    <br><br>

    <input type="password" name="password" placeholder="Mot de passe" required>
    <br><br>

    <button type="submit">
        S'inscrire
    </button>
</form>

</body>
</html>
